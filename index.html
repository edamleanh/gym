<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darebee Recomp | Slim Fit Journey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-mesh"></div>
    
    <header class="app-header">
        <div class="header-content">
            <h1>Darebee Recomp</h1>
            <p class="subtitle">7-Day Slim Fit & Low Body Fat Program</p>
        </div>
    </header>

    <nav class="day-selector" id="daySelector">
        <!-- Buttons injected by JS -->
    </nav>

    <main class="workout-container">
        <div class="glass-card main-workout-card">
            <div class="workout-header">
                <span class="day-badge" id="currentDayBadge">TODAY</span>
                <h2 id="workoutTitle">Loading...</h2>
                <p class="workout-focus" id="workoutFocus">...</p>
            </div>
            
            <div class="workout-instructions" id="workoutInstructions">
                <!-- Instruction details injected by JS -->
            </div>

            <div class="workout-gallery" id="workoutGallery">
                <!-- Images injected by JS -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
